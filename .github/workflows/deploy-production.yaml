name: Publish to production

on:
  push:
    branches:
      - "main"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
            persist-credentials: false
      - name: Setup .npmrc file to install from GitHub Packages
        run: |
          echo "@lb-01:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc
      - run: npm ci
      - run: npm run build --if-present
      - name: Deploy Production 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_PROD }}
          repository-name: lb-01/ths-spa-prod
          branch: main
          folder: dist
          clean: true